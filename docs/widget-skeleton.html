<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tr('QK Widget Name')</title>
    <link rel="icon" type="image/svg+xml" href="images/qk-widget-name.svg">

    <!-- iCUE Widget Metadata -->
    <meta name="x-icue-widget-preview" content="resources/WidgetNamePreview.png">

    <!-- Device restriction: pick ONE of the following three options -->
    <!-- XE only:   <meta name="x-icue-restrictions" data-restrictions='[{"device":"dashboard_lcd"}]'> -->
    <!-- Pump only: <meta name="x-icue-restrictions" data-restrictions='[{"device":"pump_lcd"}]'> -->
    <!-- Both:      <meta name="x-icue-restrictions" data-restrictions='[{"device":"pump_lcd"},{"device":"dashboard_lcd"}]'> -->
    <meta name="x-icue-restrictions"
        data-restrictions='[{"device":"pump_lcd"},{"device":"dashboard_lcd"}]'>

    <!-- Touchscreen widgets (XE only) need this tag -->
    <!-- <meta name="x-icue-interactive"> -->

    <!-- ================================================================ -->
    <!-- Properties: Group 1 - Widget Settings                            -->
    <!-- ================================================================ -->
    <!-- Widget-specific settings go here, BEFORE customTitle.            -->
    <!-- customTitle MUST be the LAST property in Group 1.                -->

    <!-- Example: tab-buttons (preferred for 2-5 options) -->
    <!-- <meta name="x-icue-property" content="exampleSetting"
        data-label="tr('Example Setting')" data-type="tab-buttons"
        data-values="[{'key':'option1','value':tr('Option 1')},{'key':'option2','value':tr('Option 2')}]"
        data-default="'option1'"> -->

    <!-- Example: slider -->
    <!-- <meta name="x-icue-property" content="exampleSlider"
        data-label="tr('Example Slider')" data-type="slider"
        data-default="5" data-min="1" data-max="10" data-step="1"> -->

    <!-- Example: switch -->
    <!-- <meta name="x-icue-property" content="exampleSwitch"
        data-label="tr('Example Switch')" data-type="switch" data-default="true"> -->

    <!-- Example: combobox (ONLY for large lists like timezone pickers; MUST use key/value format) -->
    <!-- <meta name="x-icue-property" content="exampleCombo"
        data-label="tr('Example Combo')" data-type="combobox"
        data-values="[{'key':'val1','value':tr('Display 1')},{'key':'val2','value':tr('Display 2')}]"
        data-default="'val1'"> -->

    <meta name="x-icue-property" content="customTitle"
        data-label="tr('Custom Title')" data-type="textfield" data-default="''">

    <!-- ================================================================ -->
    <!-- Properties: Group 2 - Appearance (DP-mapped)                     -->
    <!-- ================================================================ -->
    <!-- These four properties in a second group trigger iCUE's           -->
    <!-- "Custom Style" toggle for Device Personalization integration.    -->
    <!-- Widget-specific color properties go alongside these four.        -->
    <!-- Canvas-only widgets without text may omit textColor.             -->

    <meta name="x-icue-property" content="textColor"
        data-label="tr('Text Color')" data-type="color" data-default="'#E0E0E0'">
    <meta name="x-icue-property" content="accentColor"
        data-label="tr('Accent Color')" data-type="color" data-default="'#64B5F6'">
    <meta name="x-icue-property" content="backgroundColor"
        data-label="tr('Background Color')" data-type="color" data-default="'#0A0A0A'">
    <meta name="x-icue-property" content="transparency"
        data-label="tr('Transparency')" data-type="slider"
        data-default="0" data-min="0" data-max="100" data-step="1" unit-label="%">

    <!-- Property Groups -->
    <script type="application/json" id="x-icue-groups">
    [
        {
            "title": "tr('QK Widget Name')",
            "properties": ["customTitle"]
        },
        {
            "title": "tr('Appearance')",
            "properties": ["textColor", "accentColor", "backgroundColor", "transparency"]
        }
    ]
    </script>

    <style>
        @font-face {
            font-family: 'Jost';
            font-style: normal;
            font-weight: 100 900;
            src: url(data:font/woff2;base64,PASTE_BASE64_FROM_DOCS_JOST_WOFF2_BASE64_TXT) format('woff2');
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --text-color: #E0E0E0;
            --accent-color: #64B5F6;
            --bg-color: #0A0A0A;
            --widget-opacity: 1.0;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jost', sans-serif; font-weight: 600;
            background: transparent;
            color: var(--text-color);
            user-select: none;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: color-mix(in srgb, var(--bg-color), transparent calc((1 - var(--widget-opacity)) * 100%));
            position: relative;
        }

        .widget-title {
            display: none;
            font-family: 'Jost', sans-serif; font-weight: 700;
            font-size: 3vh;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            position: absolute;
            top: 1vh;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ================================================================ */
        /* Widget content styles go here                                    */
        /* ================================================================ */


        /* ================================================================ */
        /* Responsive breakpoints                                           */
        /* ================================================================ */
        /* Use ONLY aspect-ratio queries (never min-height/max-height)      */
        /* so iCUE live previews match actual layouts.                      */

        /* Wide (HS/HL/HXL): aspect >= 2.0 */
        @media (min-aspect-ratio: 200/100) {
        }

        /* Square-ish (HM, VS): 0.9 < aspect < 2.0 */
        @media (max-aspect-ratio: 200/100) and (min-aspect-ratio: 90/100) {
        }

        /* Pump (1:1): 0.95 < aspect < 1.05 */
        @media (max-aspect-ratio: 105/100) and (min-aspect-ratio: 95/100) {
        }

        /* Portrait (VM/VL/VXL): aspect < 0.9 */
        @media (max-aspect-ratio: 90/100) {
        }

        /* Very tall (VL/VXL): aspect < 0.5 */
        @media (max-aspect-ratio: 50/100) {
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="widget-title" id="widget-title"></div>

        <!-- Widget content goes here -->

    </div>

    <script>
        // ================================================================
        // Configuration
        // ================================================================
        var cfg = {
            textColor: '#E0E0E0',
            accentColor: '#64B5F6',
            bgColor: '#0A0A0A',
            transparency: 0
        };

        // ================================================================
        // Settings
        // ================================================================
        function readSettings() {
            // -- Widget-specific properties --
            // if (typeof exampleSetting !== 'undefined') cfg.exampleSetting = exampleSetting;

            // -- Appearance (DP-mapped) --
            if (typeof textColor !== 'undefined') cfg.textColor = textColor;
            if (typeof accentColor !== 'undefined') cfg.accentColor = accentColor;
            if (typeof backgroundColor !== 'undefined') cfg.bgColor = backgroundColor;
            if (typeof transparency !== 'undefined') cfg.transparency = Number(transparency) || 0;

            // -- Custom title --
            if (typeof customTitle !== 'undefined') {
                var wt = document.getElementById('widget-title');
                wt.textContent = customTitle;
                wt.style.display = customTitle ? 'block' : 'none';
            }
        }

        function applySettings() {
            var root = document.documentElement;
            root.style.setProperty('--text-color', cfg.textColor);
            root.style.setProperty('--accent-color', cfg.accentColor);
            root.style.setProperty('--bg-color', cfg.bgColor);
            root.style.setProperty('--widget-opacity', 1 - (cfg.transparency / 100));
        }

        // ================================================================
        // Widget logic
        // ================================================================
        // Your widget's rendering, animation, and interaction code goes here.


        // ================================================================
        // iCUE lifecycle
        // ================================================================
        function onInit() {
            readSettings();
            applySettings();
            // Initialize widget here
        }

        function onDataUpdated() {
            readSettings();
            applySettings();
            // React to settings changes here
        }

        window.addEventListener('resize', function() {
            // Handle viewport changes here
        });

        // -- iCUE event binding (bare assignment, NEVER use var) --
        icueEvents = {
            "onICUEInitialized": onInit,
            "onDataUpdated": onDataUpdated
        };

        // iCUE already initialized before script ran
        if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) {
            onInit();
        }

        // Standalone fallback (outside iCUE)
        if (typeof iCUE_initialized === 'undefined') {
            onInit();
        }
    </script>
</body>
</html>
