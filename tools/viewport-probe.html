<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tr('QK Viewport Probe')</title>
    <link rel="icon" type="image/svg+xml" href="images/qk-weather.svg">

    <meta name="x-icue-restrictions"
        data-restrictions='[{"device":"pump_lcd"},{"device":"dashboard_lcd"}]'>

    <!-- Properties: Group 1 -->
    <meta name="x-icue-property" content="customTitle"
        data-label="tr('Custom Title')" data-type="textfield" data-default="''">

    <!-- Properties: Group 2 - Appearance -->
    <meta name="x-icue-property" content="textColor"
        data-label="tr('Text Color')" data-type="color" data-default="'#FFFFFF'">
    <meta name="x-icue-property" content="accentColor"
        data-label="tr('Accent Color')" data-type="color" data-default="'#00AAFF'">
    <meta name="x-icue-property" content="backgroundColor"
        data-label="tr('Background Color')" data-type="color" data-default="'#1A1A2E'">
    <meta name="x-icue-property" content="transparency"
        data-label="tr('Transparency')" data-type="slider" data-default="100"
        data-min="0" data-max="100" data-step="1">

    <!-- Property Groups -->
    <script type="application/json" id="x-icue-groups">
    [
        {
            "title": "tr('QK Viewport Probe')",
            "properties": ["customTitle"]
        },
        {
            "title": "tr('Appearance')",
            "properties": ["textColor", "accentColor", "backgroundColor", "transparency"]
        }
    ]
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-color, #1A1A2E);
            color: var(--text-color, #FFFFFF);
            -webkit-tap-highlight-color: transparent;
        }
        #dims {
            font-size: 8vmin;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }
        #ratio {
            font-size: 5vmin;
            opacity: 0.7;
            margin-top: 1vmin;
        }
        #dpr {
            font-size: 4vmin;
            opacity: 0.5;
            margin-top: 1vmin;
        }
        #log {
            position: absolute;
            bottom: 1vmin;
            left: 1vmin;
            right: 1vmin;
            font-size: 3vmin;
            opacity: 0.4;
            text-align: left;
            max-height: 30vh;
            overflow-y: auto;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="dims">--</div>
    <div id="ratio">--</div>
    <div id="dpr">--</div>
    <div id="log"></div>

    <script>
        var sizeHistory = [];

        function update() {
            var w = window.innerWidth;
            var h = window.innerHeight;
            var aspect = (w / h).toFixed(4);
            var dpr = window.devicePixelRatio || 1;

            document.getElementById('dims').textContent = w + ' x ' + h;
            document.getElementById('ratio').textContent = 'Aspect: ' + aspect + ':1';
            document.getElementById('dpr').textContent = 'DPR: ' + dpr;

            var entry = w + 'x' + h + ' @' + dpr;
            if (sizeHistory.length === 0 || sizeHistory[sizeHistory.length - 1] !== entry) {
                sizeHistory.push(entry);
                var logEl = document.getElementById('log');
                logEl.textContent = sizeHistory.join(' -> ');
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        update();
        window.addEventListener('resize', update);
        setInterval(update, 500);

        icueEvents = {
            "onICUEInitialized": function() { update(); },
            "onDataUpdated": function() { update(); }
        };
        if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) { update(); }
        if (typeof iCUE_initialized === 'undefined') { update(); }
    </script>
</body>
</html>
