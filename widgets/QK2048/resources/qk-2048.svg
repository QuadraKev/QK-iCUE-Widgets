<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 4x4 grid of tiles — outlined empty tiles with one filled "winning" tile -->
  <rect x="5" y="5" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="28" y="5" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="51" y="5" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="74" y="5" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="5" y="28" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="28" y="28" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="51" y="28" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="74" y="28" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="5" y="51" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="28" y="51" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="51" y="51" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="74" y="51" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="5" y="74" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="28" y="74" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <rect x="51" y="74" width="20" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Fully filled tile in bottom-right corner represents the winning tile -->
  <rect x="74" y="74" width="20" height="20" rx="3" fill="#FFFFFF"/>
</svg>
