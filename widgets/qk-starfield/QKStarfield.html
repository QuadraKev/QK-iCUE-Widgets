<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tr('QK Starfield')</title>
    <link rel="icon" type="image/svg+xml" href="images/qk-starfield.svg">

    <!-- iCUE Widget Metadata -->
    <meta name="x-icue-widget-preview" content="resources/StarfieldPreview.png">

    <!-- Properties: Group 1 - Settings -->
    <meta name="x-icue-property" content="customTitle"
        data-label="tr('Custom Title')" data-type="textfield" data-default="''">

    <meta name="x-icue-property" content="starCount"
        data-label="tr('Star Count')" data-type="slider"
        data-default="200" data-min="50" data-max="500" data-step="50">
    <meta name="x-icue-property" content="speed"
        data-label="tr('Speed')" data-type="slider"
        data-default="5" data-min="1" data-max="10" data-step="1">
    <meta name="x-icue-property" content="showTrails"
        data-label="tr('Show Trails')" data-type="switch" data-default="true">
    <meta name="x-icue-property" content="trailStrength"
        data-label="tr('Trail Strength')" data-type="slider"
        data-default="5" data-min="1" data-max="10" data-step="1">

    <!-- Properties: Group 2 - Appearance (DP-mapped) -->
    <meta name="x-icue-property" content="accentColor"
        data-label="tr('Accent Color')" data-type="color" data-default="'#FFFFFF'">
    <meta name="x-icue-property" content="backgroundColor"
        data-label="tr('Background Color')" data-type="color" data-default="'#000005'">
    <meta name="x-icue-property" content="transparency"
        data-label="tr('Transparency')" data-type="slider"
        data-default="0" data-min="0" data-max="100" data-step="1" unit-label="%">

    <!-- Property Groups -->
    <script type="application/json" id="x-icue-groups">
    [
        {
            "title": "tr('QK Starfield')",
            "properties": ["starCount", "speed", "showTrails", "trailStrength", "customTitle"]
        },
        {
            "title": "tr('Appearance')",
            "properties": ["accentColor", "backgroundColor", "transparency"]
        }
    ]
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
        canvas { display: block; width: 100vw; height: 100vh; }
    
        .widget-title {
            display: none;
            font-family: 'Jost', sans-serif; font-weight: 700;
            font-size: 3vh;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            position: absolute;
            top: 1.5vh;
            left: 0;
            right: 0;
            z-index: 10;
            pointer-events: none;
            position: relative;
        }
</style>
</head>
<body>
    <div class="widget-title" id="widget-title"></div>
    <canvas id="canvas"></canvas>

    <script>
        var cfg = {
            starCount: 200,
            speed: 5,
            showTrails: true,
            trailStrength: 5,
            accentColor: '#FFFFFF',
            bgColor: '#000005',
            transparency: 0
        };

        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var stars = [];
        var W, H, cx, cy;

        function hexToRGB(hex) {
            return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
        }

        function Star() {
            this.reset();
            this.z = Math.random() * 1000; // start at random depth for initial spread
        }

        Star.prototype.reset = function() {
            // Random position in 3D space
            this.x = (Math.random() - 0.5) * 2000;
            this.y = (Math.random() - 0.5) * 2000;
            this.z = 1000;
            this.psx = 0;
            this.psy = 0;
            this.firstFrame = true;
        };

        function initStars() {
            stars = [];
            for (var i = 0; i < cfg.starCount; i++) {
                stars.push(new Star());
            }
        }

        function resize() {
            var dpr = window.devicePixelRatio || 1;
            W = window.innerWidth;
            H = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function render() {
            var bgRGB = hexToRGB(cfg.bgColor);
            var starRGB = hexToRGB(cfg.accentColor);
            var speedMul = cfg.speed * 2;

            // Background: trail strength controls fade rate, transparency controls canvas opacity
            if (cfg.showTrails) {
                // Higher trailStrength = lower alpha = slower fade = longer trails
                var trailAlpha = 0.20 - (cfg.trailStrength / 10) * 0.15;
                ctx.fillStyle = 'rgba(' + bgRGB[0] + ',' + bgRGB[1] + ',' + bgRGB[2] + ',' + trailAlpha + ')';
            } else {
                ctx.fillStyle = 'rgb(' + bgRGB[0] + ',' + bgRGB[1] + ',' + bgRGB[2] + ')';
            }
            ctx.fillRect(0, 0, W, H);

            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                s.z -= speedMul;

                if (s.z <= 1) {
                    s.reset();
                    continue;
                }

                // Project 3D to 2D
                var sx = (s.x / s.z) * 300 + cx;
                var sy = (s.y / s.z) * 300 + cy;

                // Skip if off screen
                if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) {
                    s.reset();
                    continue;
                }

                // Size and brightness based on depth
                var depthRatio = 1 - s.z / 1000;
                var size = 0.5 + depthRatio * 3;
                var alpha = 0.2 + depthRatio * 0.8;

                // Draw trail line
                if (cfg.showTrails && !s.firstFrame) {
                    ctx.strokeStyle = 'rgba(' + starRGB[0] + ',' + starRGB[1] + ',' + starRGB[2] + ',' + (alpha * 0.5) + ')';
                    ctx.lineWidth = size * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(s.psx, s.psy);
                    ctx.lineTo(sx, sy);
                    ctx.stroke();
                }

                // Draw star
                ctx.fillStyle = 'rgba(' + starRGB[0] + ',' + starRGB[1] + ',' + starRGB[2] + ',' + alpha + ')';
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();

                s.psx = sx;
                s.psy = sy;
                s.firstFrame = false;
            }

            requestAnimationFrame(render);
        }

        function readSettings() {
            if (typeof starCount !== 'undefined') cfg.starCount = Math.max(50, Math.min(500, Number(starCount) || 200));
            if (typeof speed !== 'undefined') cfg.speed = Math.max(1, Math.min(10, Number(speed) || 5));
            if (typeof showTrails !== 'undefined') cfg.showTrails = !!showTrails;
            if (typeof trailStrength !== 'undefined') cfg.trailStrength = Math.max(1, Math.min(10, Number(trailStrength) || 5));
            if (typeof accentColor !== 'undefined') cfg.accentColor = accentColor;
            if (typeof backgroundColor !== 'undefined') cfg.bgColor = backgroundColor;
            if (typeof transparency !== 'undefined') cfg.transparency = Number(transparency) || 0;
            if (typeof customTitle !== 'undefined') {
                var wt = document.getElementById('widget-title');
                wt.textContent = customTitle;
                wt.style.display = customTitle ? 'block' : 'none';
            }
            // Apply transparency as canvas CSS opacity
            canvas.style.opacity = 1 - (cfg.transparency / 100);
        }

        function onInit() {
            readSettings();
            resize();
            // Fill canvas with solid bg color before animation starts
            var bgRGB = hexToRGB(cfg.bgColor);
            ctx.fillStyle = 'rgb(' + bgRGB[0] + ',' + bgRGB[1] + ',' + bgRGB[2] + ')';
            ctx.fillRect(0, 0, W, H);
            initStars();
            requestAnimationFrame(render);
        }

        function onDataUpdated() {
            var oldCount = cfg.starCount;
            readSettings();
            if (cfg.starCount !== oldCount) initStars();
        }

        window.addEventListener('resize', function() { resize(); initStars(); });

        icueEvents = {
            "onICUEInitialized": onInit,
            "onDataUpdated": onDataUpdated
        };

        if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) onInit();
        if (typeof iCUE_initialized === 'undefined') onInit();
    </script>
</body>
</html>
