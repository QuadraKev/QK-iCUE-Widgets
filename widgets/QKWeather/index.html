        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --text-color: #E0E0E0;
            --accent-color: #E660FF;
            --secondary-color: #529BFF;
            --warm-color: #FFB100;
            --bg-color: #4F5458;
            --widget-opacity: 1.0;
            --card-bg: color-mix(in srgb, var(--text-color) 6%, var(--bg-color));
            --border: color-mix(in srgb, var(--text-color) 12%, var(--bg-color));
            --text-muted: color-mix(in srgb, var(--text-color) 40%, var(--bg-color));
            --text-secondary: color-mix(in srgb, var(--text-color) 65%, var(--bg-color));
            --s: 1;
            --u: 1cqmin;
        }

        html { overflow: hidden; }

        body {
            width: calc(100vw * var(--s)); height: calc(100vh * var(--s));
            transform: scale(calc(1 / var(--s)));
            transform-origin: top left;
            container-type: size;
            overflow: hidden;
            font-family: 'Jost', sans-serif; font-weight: 600;
            background: transparent;
            color: var(--text-color);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            gap: calc(2 * var(--u));
            padding: calc(2 * var(--u));
            background-color: color-mix(in srgb, var(--bg-color), transparent calc((1 - var(--widget-opacity)) * 100%));
            padding: var(--squircle-inset, 0px);
            position: relative;
        }

        .widget-title {
            display: none;
            font-family: 'Jost', sans-serif; font-weight: 700;
            font-size: 3vh;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            position: absolute;
            top: 1vh; left: 0; right: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ============== Status overlay ============== */
        .status {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: calc(2 * var(--u));
            z-index: 50;
            background-color: color-mix(in srgb, var(--bg-color), transparent calc((1 - var(--widget-opacity)) * 100%));
        }
        .status.hidden { display: none; }

        .spinner {
            width: calc(6 * var(--u)); height: calc(6 * var(--u));
            border: calc(0.5 * var(--u)) solid var(--border);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .spinner.hidden { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-msg {
            font-size: calc(2.5 * var(--u));
            color: var(--text-secondary);
            text-align: center;
            padding: 0 calc(4 * var(--u));
        }

        .retry-btn {
            display: none;
            padding: calc(1.5 * var(--u)) calc(3 * var(--u));
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            font-family: 'Jost', sans-serif; font-weight: 700;
            font-size: calc(2 * var(--u));
            cursor: pointer;
            min-width: calc(8 * var(--u)); min-height: calc(8 * var(--u));
        }
        .retry-btn:active { opacity: 0.8; }

        /* ============== Current weather ============== */
        .current {
            display: none; flex-direction: column;
        }
        .current.shown {
            display: flex; flex-direction: column;
            gap: calc(1.5 * var(--u));
            background: var(--card-bg);
            padding: calc(2 * var(--u));
            border: 1px solid var(--border);
            position: relative; overflow: hidden;
            flex: 0 0 auto;
        }

        .current-head {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .loc-name {
            font-weight: 700;
            font-size: calc(6 * var(--u));
            line-height: 1.1;
        }
        .loc-region {
            font-size: calc(2.5 * var(--u));
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: calc(0.3 * var(--u));
        }

        .live-wrap {
            display: flex; align-items: center; gap: calc(0.8 * var(--u));
            font-size: calc(2.5 * var(--u));
            color: var(--text-muted);
            white-space: nowrap;
        }
        .live-dot {
            width: calc(1.5 * var(--u)); height: calc(1.5 * var(--u));
            background: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .current-body {
            display: flex; align-items: center; gap: calc(4 * var(--u));
            justify-content: center;
        }
        .icon-wrap {
            width: calc(18 * var(--u)); height: calc(18 * var(--u));
            display: flex; align-items: center; justify-content: center;
            background: color-mix(in srgb, var(--text-color) 3%, var(--bg-color));
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .icon-wrap img {
            width: 80%; height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 calc(0.5 * var(--u)) calc(1.5 * var(--u)) rgba(0,0,0,0.3));
        }

        .temp-block { text-align: center; }
        .temp {
            font-weight: 700;
            font-size: calc(14 * var(--u));
            line-height: 0.95;
        }
        .temp-unit {
            font-size: 0.35em;
            color: var(--text-secondary);
            vertical-align: super;
        }
        .feels {
            font-size: calc(3 * var(--u));
            color: var(--text-secondary);
            margin-top: calc(0.3 * var(--u));
        }
        .desc {
            font-size: calc(3.5 * var(--u));
            font-weight: 700;
            text-transform: capitalize;
            margin-top: calc(0.3 * var(--u));
        }

        .details {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: calc(1 * var(--u));
        }
        .detail-card {
            background: color-mix(in srgb, var(--text-color) 3%, var(--bg-color));
            padding: calc(1.8 * var(--u));
            text-align: center;
            border: 1px solid var(--border);
        }
        .detail-lbl {
            font-size: calc(2.5 * var(--u));
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: calc(0.1 * var(--u));
            margin-bottom: calc(0.3 * var(--u));
            white-space: nowrap;
        }
        .detail-val {
            font-size: calc(4 * var(--u));
            white-space: nowrap;
            font-weight: 700;
        }
        .detail-val.accent { color: var(--secondary-color); }
        .detail-val.warm { color: var(--warm-color); }

        /* ============== Forecast ============== */
        .forecast {
            display: none; flex-direction: column;
        }
        .forecast.shown {
            display: flex; flex-direction: column;
            gap: calc(1 * var(--u));
            background: var(--card-bg);
            padding: calc(2 * var(--u));
            border: 1px solid var(--border);
            flex: 1; min-height: 0;
        }
        .forecast-head {
            font-weight: 700;
            font-size: calc(3 * var(--u));
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: calc(0.1 * var(--u));
            padding-bottom: calc(1 * var(--u));
            border-bottom: 1px solid var(--border);
        }
        .forecast-grid {
            display: grid;
            grid-auto-columns: 1fr;
            grid-auto-flow: column;

        }

        .fday {
            background: color-mix(in srgb, var(--text-color) 3%, var(--bg-color));
            padding: calc(1.5 * var(--u));
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .fday.today {
            background: color-mix(in srgb, var(--accent-color) 8%, color-mix(in srgb, var(--text-color) 3%, var(--bg-color)));
        }
        .fday-name {
            font-size: calc(2.2 * var(--u));
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: calc(0.1 * var(--u));
        }
        .fday.today .fday-name { color: var(--accent-color); }
        .fday-date {
            font-size: calc(1.8 * var(--u));
            color: var(--text-secondary);
            font-weight: 500;
        }
        .fday-icon {
            width: calc(7.5 * var(--u)); height: calc(7.5 * var(--u));
            margin: calc(0.3 * var(--u)) 0;
        }
        .fday-icon img { width: 100%; height: 100%; object-fit: contain; }
        .fday-hi {
            font-size: calc(3.2 * var(--u));
            font-weight: 700;
        }
        .fday-lo {
            font-size: calc(2.2 * var(--u));
            color: var(--text-muted);
        }
        .fday-precip {
            display: flex; align-items: center; gap: calc(0.3 * var(--u));
            font-size: calc(1.8 * var(--u));
            color: var(--secondary-color);
            margin-top: calc(0.3 * var(--u));
        }
        .fday-precip svg {
            width: calc(1.6 * var(--u)); height: calc(1.6 * var(--u));
        }

        /* ============== Responsive ============== */

        /* Keyboard LCD (248x170, ~1.46:1) */
        @media (min-aspect-ratio: 135/100) and (max-aspect-ratio: 155/100) {
            .container { padding: calc(2 * var(--u)); gap: calc(1 * var(--u)); justify-content: center; }
            .forecast { display: none !important; }
            .current, .current.shown {
                border: none; background: transparent; padding: 0;
                flex: 0 0 auto; gap: calc(1 * var(--u));
            }

            .current-body { flex-direction: row; gap: calc(3 * var(--u)); align-items: center; justify-content: center; }
            .current-head { display: none; }
            .details { display: none; }
            .live-wrap { display: none; }
            .icon-wrap { width: calc(35 * var(--u)); height: calc(35 * var(--u)); background: none; border: none; flex-shrink: 0; }
            .temp { font-size: calc(30 * var(--u)); }
            .feels { font-size: calc(8 * var(--u)); }
            .desc { font-size: calc(9 * var(--u)); }
        }

        /* Wide (HS/HL/HXL): aspect >= 2.0 */
        @media (min-aspect-ratio: 200/100) {
            .container { flex-direction: row; }
            .current.shown { flex: 0 0 35%; }
            .current-body { flex: 1; }
            .forecast { flex: 1; }
            .details { grid-template-columns: repeat(2, 1fr); }
            .temp { font-size: calc(20 * var(--u)); }
            .icon-wrap { width: calc(22 * var(--u)); height: calc(22 * var(--u)); }

            .loc-name { font-size: calc(7 * var(--u)); }
            .forecast-head { font-size: calc(3.5 * var(--u)); }
            .fday-name { font-size: calc(3 * var(--u)); }
            .fday-date { font-size: calc(2.2 * var(--u)); }
            .fday-icon { width: calc(12 * var(--u)); height: calc(12 * var(--u)); }
            .fday-hi { font-size: calc(5 * var(--u)); }
            .fday-lo { font-size: calc(3 * var(--u)); }
            .fday-precip { font-size: calc(2.5 * var(--u)); }
            .fday-precip svg { width: calc(2.2 * var(--u)); height: calc(2.2 * var(--u)); }
        }

        /* Extra wide (HXL): aspect >= 3.5 */
        @media (min-aspect-ratio: 350/100) {
            .forecast-head { font-size: calc(5 * var(--u)); }
            .fday-name { font-size: calc(5 * var(--u)); }
            .fday-date { font-size: calc(3.5 * var(--u)); }
            .fday-icon { width: calc(20 * var(--u)); height: calc(20 * var(--u)); }
            .fday-hi { font-size: calc(9 * var(--u)); }
            .fday-lo { font-size: calc(5 * var(--u)); }
            .fday-precip { font-size: calc(4 * var(--u)); }
            .fday-precip svg { width: calc(3.5 * var(--u)); height: calc(3.5 * var(--u)); }
        }

        /* Square-ish (HM, VS): 0.9 to 2.0 */
        @media (max-aspect-ratio: 200/100) and (min-aspect-ratio: 90/100) {
            .forecast { flex: 1; }
            .current-body { gap: calc(2 * var(--u)); }
        }

        /* HS / VS: side-by-side current weather + 2x2 details */
        @media (min-aspect-ratio: 243/100) and (max-aspect-ratio: 300/100),
               (max-aspect-ratio: 180/100) and (min-aspect-ratio: 150/100) {
            .current.shown {
                display: grid;
                grid-template-columns: 3fr 2fr;
                grid-template-rows: auto 1fr;
                flex: 1;
            }
            .current-head { grid-column: 1 / -1; }
            .current-body { align-self: center; justify-self: center; }
            .details {
                grid-template-columns: repeat(2, 1fr);
                align-self: center;
            }
            .loc-name { font-size: calc(13 * var(--u)); }
            .loc-region { font-size: calc(5 * var(--u)); }
            .icon-wrap { width: calc(32 * var(--u)); height: calc(32 * var(--u)); }
            .temp { font-size: calc(30 * var(--u)); }
            .feels { font-size: calc(5 * var(--u)); }
            .desc { font-size: calc(6 * var(--u)); }
            .detail-val { font-size: calc(8 * var(--u)); }
            .detail-lbl { font-size: calc(4.5 * var(--u)); }
            .detail-card { padding: calc(2 * var(--u)); }
            .current-body { gap: calc(4 * var(--u)); }
            .live-wrap { font-size: calc(4.2 * var(--u)); }
            .live-dot { width: calc(2.5 * var(--u)); height: calc(2.5 * var(--u)); }
        }

        /* VS only: stack detail cards vertically with timestamp above */
        @media (max-aspect-ratio: 180/100) and (min-aspect-ratio: 150/100) {
            .current-head { grid-column: 1; }
            .live-wrap {
                position: absolute;
                top: calc(3 * var(--u));
                right: calc(2 * var(--u));
            }
            .current.shown { position: relative; }
            .details {
                grid-column: 2;
                grid-row: 1 / -1;
                grid-template-columns: 1fr;
                gap: calc(0.5 * var(--u));
                align-self: start;
                margin-top: calc(7 * var(--u));
            }
            .detail-card { padding: calc(0.8 * var(--u)) calc(1.5 * var(--u)); }
            .detail-lbl { font-size: calc(4 * var(--u)); margin-bottom: calc(0.1 * var(--u)); }
            .detail-val { font-size: calc(8 * var(--u)); }

        /* Pump (1:1): 0.95 to 1.05 */
        @media (max-aspect-ratio: 105/100) and (min-aspect-ratio: 95/100) {
            .container { padding: calc(10 * var(--u)); justify-content: center; }
            .forecast { display: none !important; }

            .current-body { flex-direction: column; gap: calc(3 * var(--u)); align-items: center; }
            .current-head { flex-direction: column; align-items: center; }
            .loc-name { text-align: center; font-size: calc(7.5 * var(--u)); }
            .loc-region { text-align: center; font-size: calc(3.5 * var(--u)); }
            .live-wrap { display: none; }
            .details { display: none; }
            .temp { font-size: calc(22 * var(--u)); }
            .icon-wrap { width: calc(22 * var(--u)); height: calc(22 * var(--u)); background: none; border: none; }
            .feels { font-size: calc(4 * var(--u)); }
            .desc { font-size: calc(5 * var(--u)); }

            .forecast { flex: 1; }
            .current-body { gap: calc(2 * var(--u)); }
            .details { grid-template-columns: repeat(2, 1fr); }

            .detail-lbl { font-size: calc(3.5 * var(--u)); }

            .fday-precip svg { width: calc(2.5 * var(--u)); height: calc(2.5 * var(--u)); }

        // ================================================================
        // WMO Weather Code Mapping
        // ================================================================
        var WMO_CODES = {
            0:  { desc: 'Clear Sky',             day: 'clear-day',             night: 'clear-night' },
            1:  { desc: 'Mainly Clear',          day: 'partly-cloudy-day',     night: 'partly-cloudy-night' },
            2:  { desc: 'Partly Cloudy',         day: 'partly-cloudy-day',     night: 'partly-cloudy-night' },
            3:  { desc: 'Overcast',              icon: 'overcast' },
            45: { desc: 'Fog',                   icon: 'fog' },
            48: { desc: 'Rime Fog',              icon: 'fog' },
            51: { desc: 'Light Drizzle',         icon: 'drizzle' },
            53: { desc: 'Drizzle',               icon: 'drizzle' },
            55: { desc: 'Heavy Drizzle',         icon: 'drizzle' },
            56: { desc: 'Freezing Drizzle',      icon: 'sleet' },
            57: { desc: 'Freezing Drizzle',      icon: 'sleet' },
            61: { desc: 'Light Rain',            icon: 'rain' },
            63: { desc: 'Rain',                  icon: 'rain' },
            65: { desc: 'Heavy Rain',            icon: 'extreme-rain' },
            66: { desc: 'Freezing Rain',         icon: 'sleet' },
            67: { desc: 'Freezing Rain',         icon: 'sleet' },
            71: { desc: 'Light Snow',            icon: 'snow' },
            73: { desc: 'Snow',                  icon: 'snow' },
            75: { desc: 'Heavy Snow',            icon: 'extreme-snow' },
            77: { desc: 'Snow Grains',           icon: 'snow' },
            80: { desc: 'Light Showers',         icon: 'rain' },
            81: { desc: 'Showers',               icon: 'rain' },
            82: { desc: 'Heavy Showers',         icon: 'extreme-rain' },
            85: { desc: 'Snow Showers',          icon: 'snow' },
            86: { desc: 'Heavy Snow Showers',    icon: 'extreme-snow' },
            95: { desc: 'Thunderstorm',          day: 'thunderstorms-day',     night: 'thunderstorms-night' },
            96: { desc: 'Thunderstorm w/ Hail',  day: 'thunderstorms-day',     night: 'thunderstorms-night' },
            99: { desc: 'Thunderstorm w/ Hail',  day: 'thunderstorms-day',     night: 'thunderstorms-night' }
        };

        function wmoLookup(code) {
            return WMO_CODES[code] || { desc: 'Unknown', day: 'partly-cloudy-day', night: 'partly-cloudy-night' };
        }

        function weatherIconUrl(code, isDay) {
            var wmo = WMO_CODES[code] || { day: "partly-cloudy-day", night: "partly-cloudy-night" };
            var key = wmo.icon || (isDay !== false ? wmo.day : wmo.night);
            return WEATHER_ICONS[key];
        }

                // ================================================================
        // Settings
        // ================================================================
        function readSettings() {
            if (typeof weatherLocation !== 'undefined') cfg.weatherLocation = weatherLocation;
            if (typeof temperatureUnits !== 'undefined') cfg.temperatureUnits = temperatureUnits;
            if (typeof windSpeedUnits !== 'undefined') cfg.windSpeedUnits = windSpeedUnits;
            if (typeof precipUnits !== 'undefined') cfg.precipUnits = precipUnits;
            if (typeof textColor !== 'undefined') cfg.textColor = textColor;
            if (typeof accentColor !== 'undefined') cfg.accentColor = accentColor;
            if (typeof secondaryColor !== 'undefined') cfg.secondaryColor = secondaryColor;
            if (typeof warmColor !== 'undefined') cfg.warmColor = warmColor;
            if (typeof backgroundColor !== 'undefined') cfg.bgColor = backgroundColor;
            if (typeof transparency !== 'undefined') cfg.transparency = Number(transparency) || 0;
            if (typeof customTitle !== 'undefined') {
                var wt = document.getElementById('widget-title');
                wt.textContent = customTitle;
                wt.style.display = customTitle ? 'block' : 'none';
            }
        }

        function applySettings() {
            var root = document.documentElement;
            root.style.setProperty('--text-color', cfg.textColor);
            root.style.setProperty('--accent-color', cfg.accentColor);
            root.style.setProperty('--secondary-color', cfg.secondaryColor);
            root.style.setProperty('--warm-color', cfg.warmColor);
            root.style.setProperty('--bg-color', cfg.bgColor);
            root.style.setProperty('--widget-opacity', cfg.transparency / 100);
            document.getElementById('tempUnit').textContent =
                cfg.temperatureUnits === 'fahrenheit' ? '\u00B0F' : '\u00B0C';
        }

        // ================================================================
        // State management
        // ================================================================
        function showStatus(msg, showSpinner, showRetry) {
            document.getElementById('statusMsg').textContent = msg;
            document.getElementById('spinner').classList.toggle('hidden', !showSpinner);
            document.getElementById('retryBtn').style.display = showRetry ? 'block' : 'none';
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('current').classList.remove('shown');
            document.getElementById('forecast').classList.remove('shown');
        }

        function showWeather() {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('current').classList.add('shown');
            var days = getForecastDays();
            document.getElementById('forecast').classList.toggle('shown', days > 0);
            document.getElementById('current').style.flex = days > 0 ? '' : '1';
            requestAnimationFrame(updateSquircle);
        }

        // ================================================================
        // Forecast day count
        // ================================================================
        function getForecastDays() {
            var aspect = window.innerWidth / window.innerHeight;
            if (aspect >= 0.95 && aspect <= 1.05) return 0; // Pump
            if (aspect >= 2.43 && aspect <= 3.0) return 0;  // HS (current only)
            if (aspect >= 1.5 && aspect <= 1.8) return 0;   // VS (current only)
            if (aspect >= 2.0) return 7;                    // HL, HXL
            if (aspect < 0.5) return 7;                     // VL, VXL
            return 5;                                       // HM, VM
        }

        // ================================================================
        // API fetch (Open-Meteo)
        // ================================================================
        function fetchWeather(silent) {
            var locId = String(cfg.weatherLocation || '').trim();
            if (!locId) {
                showStatus('Select a location in widget settings', false, false);
                return;
            }

            if (!silent) showStatus('Loading weather data...', true, false);

            // Step 1: resolve location ID to coordinates
            fetch('https://geocoding-api.open-meteo.com/v1/get?id=' + encodeURIComponent(locId))
                .then(function(r) { return r.json(); })
                .then(function(loc) {
                    if (!loc || !loc.latitude) throw new Error('Invalid location');
                    locationData = loc;
                    document.getElementById('locName').textContent = loc.name || '';
                    document.getElementById('locRegion').textContent =
                        (loc.admin1 ? loc.admin1 + ', ' : '') + (loc.country || '');

                    // Step 2: fetch weather data
                    var url = 'https://api.open-meteo.com/v1/forecast' +
                        '?latitude=' + loc.latitude +
                        '&longitude=' + loc.longitude +
                        '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,uv_index,precipitation,is_day' +
                        '&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max' +
                        '&timezone=auto&forecast_days=7' +
                        '&wind_speed_unit=' + cfg.windSpeedUnits +
                        '&temperature_unit=' + cfg.temperatureUnits +
                        '&precipitation_unit=' + cfg.precipUnits;
                    return fetch(url);
                })
                .then(function(r) {
                    if (!r.ok) throw new Error('Weather API Error: ' + r.status);
                    return r.json();
                })
                .then(function(d) {
                    renderCurrent(d.current, d.current_units);
                    // Build forecast array from daily arrays
                    var daily = d.daily;
                    var forecast = [];
                    for (var i = 0; i < daily.time.length; i++) {
                        forecast.push({
                            date: daily.time[i],
                            high: daily.temperature_2m_max[i],
                            low: daily.temperature_2m_min[i],
                            code: daily.weather_code[i],
                            pop: daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : 0
                        });
                    }
                    lastForecastData = forecast;
                    renderForecast();
                    showWeather();
                })
                .catch(function(err) {
                    showStatus('Unable to fetch weather data', false, true);
                });
        }

        // ================================================================
        // Render
        // ================================================================
        function renderCurrent(c, units) {
            document.getElementById('tempVal').textContent = Math.round(c.temperature_2m);
            document.getElementById('feelsVal').textContent = Math.round(c.apparent_temperature);

            var wmo = wmoLookup(c.weather_code);
            document.getElementById('wxDesc').textContent = wmo.desc;
            var isDay = c.is_day !== 0;
            document.getElementById('wxIcon').src = weatherIconUrl(c.weather_code, isDay);
            document.getElementById('wxIcon').alt = wmo.desc;

            var windUnit = cfg.windSpeedUnits === 'mph' ? ' mph' : ' km/h';
            var windDir = '';
            if (c.wind_direction_10m !== undefined) {
                var dirs = ['N','NE','E','SE','S','SW','W','NW'];
                windDir = dirs[Math.round(c.wind_direction_10m / 45) % 8] + ' ';
            }
            document.getElementById('windVal').textContent = windDir + Math.round(c.wind_speed_10m) + windUnit;
            document.getElementById('humVal').textContent = Math.round(c.relative_humidity_2m) + '%';
            var uvRound = Math.round(c.uv_index);
            var uvEl = document.getElementById('uvVal');
            uvEl.textContent = uvRound;
            if (uvRound <= 2) uvEl.style.color = '#4CAF50';
            else if (uvRound <= 5) uvEl.style.color = '#FFC107';
            else if (uvRound <= 7) uvEl.style.color = '#FF9800';
            else if (uvRound <= 10) uvEl.style.color = '#F44336';
            else uvEl.style.color = '#9C27B0';
            document.getElementById('precipVal').textContent =
                (c.precipitation ? c.precipitation.toFixed(1) : '0') + ' ' + (units && units.precipitation || 'mm');

            var now = new Date();
            document.getElementById('updateTime').textContent =
                'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function renderForecast() {
            if (!lastForecastData) return;
            var data = lastForecastData;
            var grid = document.getElementById('forecastGrid');
            var count = getForecastDays();
            if (count === 0) return;

            grid.innerHTML = '';
            document.getElementById('forecastHead').textContent =
                count >= 7 ? '7-Day Forecast' : count + '-Day Forecast';

            var dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            var dropSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z"/></svg>';

            data.slice(0, count).forEach(function(day, i) {
                var dt = new Date(day.date + 'T00:00:00');
                var name = i === 0 ? 'Today' : dayNames[dt.getDay()];
                var dateStr = dt.toLocaleDateString([], { month: 'short', day: 'numeric' });
                var wmo = wmoLookup(day.code);

                var el = document.createElement('div');
                el.className = 'fday' + (i === 0 ? ' today' : '');
                el.innerHTML =
                    '<div><div class="fday-name">' + name + '</div>' +
                    '<div class="fday-date">' + dateStr + '</div></div>' +
                    '<div class="fday-icon"><img src="' + weatherIconUrl(day.code) +
                        '" alt="' + wmo.desc + '"></div>' +
                    '<div><div class="fday-hi">' + Math.round(day.high) + '\u00B0</div>' +
                    '<div class="fday-lo">' + Math.round(day.low) + '\u00B0</div></div>' +
                    '<div class="fday-precip">' + dropSvg + (day.pop || 0) + '%</div>';
                grid.appendChild(el);
            });
        }

        // ================================================================
        // Lifecycle
        // ================================================================
        function onInit() {
            readSettings();
            applySettings();
            updateSquircle();
            fetchWeather();
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(function() { fetchWeather(true); }, REFRESH_MS);
        }

        function onDataUpdated() {
            var prevLoc = cfg.weatherLocation;
            var prevTemp = cfg.temperatureUnits;
            var prevWind = cfg.windSpeedUnits;
            var prevPrecip = cfg.precipUnits;
            readSettings();
            applySettings();
            if (cfg.weatherLocation !== prevLoc || cfg.temperatureUnits !== prevTemp ||
                cfg.windSpeedUnits !== prevWind || cfg.precipUnits !== prevPrecip) {
                fetchWeather();
            }
        }

        updatePreviewScale();
        window.addEventListener('resize', function() {
            updatePreviewScale();
            if (!document.getElementById('status').classList.contains('hidden')) return;
            showWeather();
            renderForecast();
        });

        // ResizeObserver recomputes squircles after layout fully settles
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(function() {
                // Clear stale clip-paths on layout-volatile cards before recomputing
                document.querySelectorAll('.current.shown, .forecast.shown').forEach(function(e) { e.style.clipPath = ''; e.style.padding = ''; });
                requestAnimationFrame(updateSquircle);
            }).observe(document.querySelector('.container'));
        }


        // Squircle clip-path (superellipse corners, n=5)
        function squirclePath(w, h, radiusFraction) {
            if (!w || !h || isNaN(w) || isNaN(h)) return 'none';
            var r = Math.min(w, h) * radiusFraction;
            r = Math.min(r, w / 2, h / 2);
            var n = 5, ppq = 16, d = [];
            d.push('M' + r.toFixed(1) + ' 0');
            d.push('L' + (w - r).toFixed(1) + ' 0');
            for (var i = 1; i <= ppq; i++) { var a = (i / ppq) * Math.PI / 2; var sa = Math.pow(Math.sin(a), 2 / n); var ca = Math.pow(Math.cos(a), 2 / n); d.push('L' + ((w - r) + r * sa).toFixed(1) + ' ' + (r - r * ca).toFixed(1)); }
            d.push('L' + w.toFixed(1) + ' ' + (h - r).toFixed(1));
            for (var i = 1; i <= ppq; i++) { var a = (i / ppq) * Math.PI / 2; var sa = Math.pow(Math.sin(a), 2 / n); var ca = Math.pow(Math.cos(a), 2 / n); d.push('L' + ((w - r) + r * ca).toFixed(1) + ' ' + ((h - r) + r * sa).toFixed(1)); }
            d.push('L' + r.toFixed(1) + ' ' + h.toFixed(1));
            for (var i = 1; i <= ppq; i++) { var a = (i / ppq) * Math.PI / 2; var sa = Math.pow(Math.sin(a), 2 / n); var ca = Math.pow(Math.cos(a), 2 / n); d.push('L' + (r - r * sa).toFixed(1) + ' ' + ((h - r) + r * ca).toFixed(1)); }
            d.push('L0 ' + r.toFixed(1));
            for (var i = 1; i <= ppq; i++) { var a = (i / ppq) * Math.PI / 2; var sa = Math.pow(Math.sin(a), 2 / n); var ca = Math.pow(Math.cos(a), 2 / n); d.push('L' + (r - r * ca).toFixed(1) + ' ' + (r - r * sa).toFixed(1)); }
            d.push('Z');
            return "path('" + d.join(' ') + "')";
        }

        function applySquircle(selector, radiusFraction) {
            var el = document.querySelector(selector);
            if (!el || el.offsetWidth === 0 || el.offsetHeight === 0) return;
            var cp = squirclePath(el.offsetWidth, el.offsetHeight, radiusFraction);
            document.querySelectorAll(selector).forEach(function(e) { e.style.clipPath = cp; });
        }

        function updateSquircle() {
            var el = document.querySelector('.container');
            var cw = el.offsetWidth, ch = el.offsetHeight;
            if (cw === 0 || ch === 0) return;

            var r = Math.min(cw, ch) * 0.125;
            el.style.setProperty('--squircle-inset', (r * 0.25).toFixed(1) + 'px');
            el.style.clipPath = squirclePath(cw, ch, 0.125);

            applySquircle('.retry-btn', 0.125);
            applySquircle('.icon-wrap', 0.125);
            applySquircle('.detail-card', 0.125);
            applySquircle('.fday', 0.125);

            ['.current.shown', '.forecast.shown'].forEach(function(sel) {
                var card = document.querySelector(sel);
                if (card && card.offsetWidth > 0) {
                    var cr = Math.min(card.offsetWidth, card.offsetHeight) * 0.125;
                    card.style.padding = (cr * 0.25).toFixed(1) + 'px';
                    card.style.clipPath = squirclePath(card.offsetWidth, card.offsetHeight, 0.125);
                }
            });
        }

        icueEvents = {
            "onICUEInitialized": onInit,
            "onDataUpdated": onDataUpdated
        };

        if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) {
            onInit();
        }
        if (typeof iCUE_initialized === 'undefined') {
            onInit();
        }
    </script>
</body>
</html>
