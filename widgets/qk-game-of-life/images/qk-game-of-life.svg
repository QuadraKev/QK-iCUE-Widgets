<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grid background -->
  <rect x="10" y="10" width="80" height="80" fill="none" stroke="#333" stroke-width="0.5"/>
  <!-- Grid lines -->
  <line x1="30" y1="10" x2="30" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="70" y1="10" x2="70" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="10" y1="30" x2="90" y2="30" stroke="#333" stroke-width="0.5"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#333" stroke-width="0.5"/>
  <line x1="10" y1="70" x2="90" y2="70" stroke="#333" stroke-width="0.5"/>
  <!-- Alive cells (glider pattern + extras) -->
  <rect x="31" y="11" width="18" height="18" rx="2" fill="#00FF88"/>
  <rect x="51" y="31" width="18" height="18" rx="2" fill="#00FF88"/>
  <rect x="11" y="51" width="18" height="18" rx="2" fill="#00FF88"/>
  <rect x="31" y="51" width="18" height="18" rx="2" fill="#00FF88"/>
  <rect x="51" y="51" width="18" height="18" rx="2" fill="#00FF88"/>
  <rect x="71" y="71" width="18" height="18" rx="2" fill="#00FF88" opacity="0.5"/>
</svg>
