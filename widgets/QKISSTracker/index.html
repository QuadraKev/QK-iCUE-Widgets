        data-label="tr('Accent Color')" data-type="color" data-default="'#FFB100'">

        :root {
            --text-color: #E0E0E0;
            --accent-color: #FFB100;
            --map-color: #529BFF;
            --bg-color: #0A0A0A;
            --widget-opacity: 1.0;
            --text-muted: color-mix(in srgb, var(--text-color) 45%, var(--bg-color));
            --text-secondary: color-mix(in srgb, var(--text-color) 70%, var(--bg-color));
            --panel-border: color-mix(in srgb, var(--text-color) 12%, var(--bg-color));

            --layout-unit: 1.2vh;   /* wide slots (default); overridden per aspect below */
            --font-hero: calc(var(--layout-unit) * 7);
            --font-value: calc(var(--layout-unit) * 4.6);
            --font-label: calc(var(--layout-unit) * 2.4);
            --font-title: calc(var(--layout-unit) * 3.4);
            --space-gap: calc(var(--layout-unit) * 2);
            --space-pad: calc(var(--layout-unit) * 3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: 'Jost', sans-serif;
            background-color: color-mix(in srgb, var(--bg-color), transparent calc((1 - var(--widget-opacity)) * 100%));
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        #media-background {
            position: absolute; inset: 0; z-index: 0; overflow: hidden;
            visibility: hidden; filter: blur(var(--glass-blur, 0px));
        }
        .position-container { position: absolute; transform-origin: top left; }
        .scale-container { transform-origin: top left; }
        .rotation-container { transform-origin: center center; }
        .rotation-container img, .rotation-container video { display: block; object-fit: contain; }
        #widget-title {
            position: absolute; top: var(--space-gap); left: 0; right: 0;
            text-align: center; z-index: 3; display: none;
            font-size: var(--font-title); font-weight: 600; color: var(--text-color);
        }
        #root { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; }
        #map-wrap { flex: 1 1 auto; position: relative; min-width: 0; min-height: 0; }
        #map { position: absolute; inset: 0; width: 100%; height: 100%; }
        #sidebar {
            flex: 0 0 22%; display: flex; flex-direction: column;
            justify-content: space-evenly; padding: var(--space-pad);
            border-left: 1px solid var(--panel-border);
        }
        .stat-label {
            font-size: var(--font-label); font-weight: 400; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-muted); white-space: nowrap;
        }
        .stat-value {
            font-size: var(--font-value); font-weight: 600; color: var(--text-color);
            font-variant-numeric: tabular-nums; white-space: nowrap;
        }
        #val-pass {
            font-size: var(--font-hero); font-weight: 700; color: var(--accent-color);
            font-variant-numeric: tabular-nums; white-space: nowrap;
        }
        #status-row { font-size: var(--font-label); color: var(--text-secondary); }

        /* Default = wide slots (HS/HL/HXL, aspect >= 2.0): map left + sidebar right */

        /* HXL is much wider: slimmer sidebar, bigger unit */
        @media (min-aspect-ratio: 300/100) {
            #sidebar { flex: 0 0 14%; }
        }

        /* HM (~1.21): map on top, 2x2 stat grid below */
        @media (max-aspect-ratio: 150/100) and (min-aspect-ratio: 90/100) {
            :root { --layout-unit: 1vmin; }
            #root { flex-direction: column; }
            #map-wrap { flex: 1 1 60%; }
            #sidebar {
                flex: 0 0 auto; flex-direction: row; flex-wrap: wrap;
                border-left: none; border-top: 1px solid var(--panel-border);
                justify-content: space-between; align-items: center;
                row-gap: var(--space-gap);
            }
            #sidebar .stat { flex: 0 0 48%; }
            #status-row { flex: 0 0 100%; }
        }

        /* VS band (1.5 < aspect < 2.0): map top, single row, secondary stats hidden */
        @media (max-aspect-ratio: 199/100) and (min-aspect-ratio: 151/100) {
            :root { --layout-unit: 1.4vmin; }
            #root { flex-direction: column; }
            #map-wrap { flex: 1 1 58%; }
            #sidebar {
                flex: 0 0 auto; flex-direction: row; align-items: center;
                justify-content: space-evenly;
                border-left: none; border-top: 1px solid var(--panel-border);
            }
            #status-row, #val-pos { display: none; }
            #sidebar .stat:nth-of-type(4) { display: none; } /* Position stat block (4th div child of #sidebar: status-row, alt, spd, pos) */
        }

        /* All portrait slots (VM/VL/VXL, aspect <= 0.9): map band top, stats stacked */
        @media (max-aspect-ratio: 90/100) {
            :root { --layout-unit: 0.6vw; } /* S-vertical canonical baseline; stable across VM/VL/VXL */
            #root { flex-direction: column; }
            #map-wrap { flex: 0 0 auto; height: 50vw; } /* ~2:1 map band */
            #sidebar {
                flex: 1 1 auto; flex-direction: column; justify-content: space-evenly;
                border-left: none; border-top: 1px solid var(--panel-border);
            }
        }

        /* Very tall (VL/VXL): extra breathing room, centered stats */
        @media (max-aspect-ratio: 50/100) {
            #sidebar { justify-content: center; gap: calc(var(--layout-unit) * 8); align-items: center; text-align: center; }
        }
    </style>
</head>
<body>
    <div id="media-background"></div>
    <div id="widget-title"></div>
    <div id="root">
        <div id="map-wrap"><canvas id="map"></canvas></div>
        <div id="sidebar">
            <div id="status-row"><span id="val-live">…</span> <span id="val-vis"></span></div>
            <div class="stat"><div class="stat-label" data-tr="Altitude"></div><div class="stat-value" id="val-alt">—</div></div>
            <div class="stat"><div class="stat-label" data-tr="Speed"></div><div class="stat-value" id="val-spd">—</div></div>
            <div class="stat"><div class="stat-label" data-tr="Position"></div><div class="stat-value" id="val-pos">—</div></div>
            <div class="stat"><div class="stat-label" data-tr="Next Pass"></div><div id="val-pass">—</div></div>
        </div>
    </div>

    <script>
        var MediaViewer = (function() {
            var imgExts = ['jpg','jpeg','png','gif','bmp','webp','svg','ico'];
            var vidExts = ['mp4','webm','ogg','mov','avi','mkv'];
            function MV(opts) {
                this.container = opts.container;
                this.pos = null; this.scl = null; this.rot = null;
                this.media = null; this.curPath = null;
            }
            MV.prototype.loadMedia = function(p) {
                var path = p.path; if (!path) { this.clear(); return; }
                var decoded = decodeURIComponent(path);
                if (this.curPath === decoded) { this._transform(p); return; }
                this.clear();
                var ext = decoded.split('.').pop().toLowerCase();
                if (imgExts.indexOf(ext) !== -1) {
                    this.media = document.createElement('img');
                    this.media.src = decoded;
                } else if (vidExts.indexOf(ext) !== -1) {
                    this.media = document.createElement('video');
                    this.media.autoplay = true; this.media.loop = true;
                    this.media.muted = true; this.media.playsInline = true;
                    this.media.src = decoded;
                    this.media.play().catch(function(){});
                } else { return; }
                this.rot = document.createElement('div'); this.rot.className = 'rotation-container';

    <script>
        var mediaViewer = null;
        var cfg = {
            issLocation: '',
            mapStyle: 'dots',
            textColor: '#E0E0E0',
            accentColor: '#FFB100',
            mapColor: '#529BFF',

        // @testable-start
        var LAT_MAX = 75;
        function projX(lon, w) { return (lon + 180) / 360 * w; }
        function projY(lat, h) {
            var c = Math.max(-LAT_MAX, Math.min(LAT_MAX, lat));
            return (LAT_MAX - c) / (2 * LAT_MAX) * h;
        }
        function wrapLon(lon) { return ((lon + 540) % 360) - 180; }
        function haversineKm(lat1, lon1, lat2, lon2) {
            var R = 6371, rad = Math.PI / 180;
            var dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
        }
        function decodeCoastline(b64) {
            var bin = atob(b64), pos = 0;
            function varint() {
                var u = 0, s = 0, b;
                do { b = bin.charCodeAt(pos++); u |= (b & 127) << s; s += 7; } while (b & 128);
                return u >>> 0;
            }
            function unzig(u) { return (u >>> 1) ^ -(u & 1); }
            var rings = [], n = varint();
            for (var i = 0; i < n; i++) {
                var m = varint(), ring = new Float32Array(m * 2), x = 0, y = 0;
                for (var j = 0; j < m; j++) {
                    x += unzig(varint()); y += unzig(varint());
                    ring[j * 2] = x / 10; ring[j * 2 + 1] = y / 10;
                }
                rings.push(ring);
            }
            return rings;
        }
        function subsolarPoint(dateMs) {
            var RAD = Math.PI / 180;
            var d = dateMs / 86400000 - 10957.5;               // days since J2000.0
            var g = (357.529 + 0.98560028 * d) * RAD;          // solar mean anomaly
            var q = 280.459 + 0.98564736 * d;                  // solar mean longitude (deg)
            var L = (q + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * RAD; // ecliptic lon
            var e = (23.439 - 0.00000036 * d) * RAD;           // obliquity
            var decl = Math.asin(Math.sin(e) * Math.sin(L));
            var ra = Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L));
            var gmstH = ((18.697374558 + 24.06570982441908 * d) % 24 + 24) % 24;
            var lon = ra / RAD - gmstH * 15;
            return { lat: decl / Math.PI * 180, lon: ((lon + 540) % 360) - 180 };
        }
        function isNight(lon, lat, sub) {
            var RAD = Math.PI / 180;
            return Math.sin(lat * RAD) * Math.sin(sub.lat * RAD) +
                   Math.cos(lat * RAD) * Math.cos(sub.lat * RAD) *
                   Math.cos((lon - sub.lon) * RAD) < 0;
        }
        function terminatorLat(lon, sub) {
            var RAD = Math.PI / 180;
            var declTan = Math.tan(sub.lat * RAD);
            if (declTan === 0) declTan = 1e-9;
            var H = (lon - sub.lon) * RAD;
            return Math.atan(-Math.cos(H) / declTan) / RAD;
        }
        function slerpPoint(lon1, lat1, lon2, lat2, t) {
            var RAD = Math.PI / 180;
            function vec(lon, lat) {
                var f = lat * RAD, l = lon * RAD;
                return [Math.cos(f) * Math.cos(l), Math.cos(f) * Math.sin(l), Math.sin(f)];
            }
            var a = vec(lon1, lat1), b = vec(lon2, lat2);
            var dot = Math.max(-1, Math.min(1, a[0] * b[0] + a[1] * b[1] + a[2] * b[2]));
            var ang = Math.acos(dot);
            if (ang < 1e-9) return [lon1, lat1];
            var s = Math.sin(ang);
            var ka = Math.sin((1 - t) * ang) / s, kb = Math.sin(t * ang) / s;
            var v = [ka * a[0] + kb * b[0], ka * a[1] + kb * b[1], ka * a[2] + kb * b[2]];
            return [Math.atan2(v[1], v[0]) / RAD, Math.asin(Math.max(-1, Math.min(1, v[2]))) / RAD];
        }
        function splitAtAntimeridian(points) {
            var segs = [], cur = [];
            for (var i = 0; i < points.length; i++) {
                if (cur.length && Math.abs(points[i][0] - cur[cur.length - 1][0]) > 180) {
                    segs.push(cur); cur = [];
                }
                cur.push(points[i]);
            }
            if (cur.length) segs.push(cur);
            return segs;
        }
        function findPassInSamples(samples, userLat, userLon, radiusKm) {
            for (var i = 0; i < samples.length; i++) {
                var d = haversineKm(userLat, userLon, samples[i][2], samples[i][1]);
                if (d < radiusKm) {
                    return {
                        riseTs: samples[i][0],
                        brackets: i > 0 ? [samples[i - 1][0], samples[i][0]] : null

            return null;
        }
        // @testable-end

        var COAST = decodeCoastline(COASTLINE_B64);
        var canvas = null, ctx = null, landCanvas = null;
        var dpr = window.devicePixelRatio || 1;

        function landPath(c, w, h) {
            c.beginPath();
            for (var i = 0; i < COAST.length; i++) {
                var r = COAST[i];
                c.moveTo(projX(r[0], w), projY(r[1], h));
                for (var j = 2; j < r.length; j += 2) c.lineTo(projX(r[j], w), projY(r[j + 1], h));
                c.closePath();
            }
        }

        function rebuildLandLayer() {
            if (!canvas || canvas.width === 0 || canvas.height === 0) return;
            var w = canvas.width, h = canvas.height;
            landCanvas = document.createElement('canvas');
            landCanvas.width = w; landCanvas.height = h;
            var c = landCanvas.getContext('2d');
            if (cfg.mapStyle === 'outline') {
                landPath(c, w, h);
                c.strokeStyle = cfg.mapColor;
                c.lineWidth = Math.max(1, h / 500);
                c.stroke();
            } else if (cfg.mapStyle === 'filled') {
                landPath(c, w, h);
                c.fillStyle = 'color-mix(in srgb, ' + cfg.mapColor + ' 38%, transparent)';
                c.fill('evenodd');
                c.strokeStyle = 'color-mix(in srgb, ' + cfg.mapColor + ' 70%, transparent)';
                c.lineWidth = Math.max(1, h / 700);
                c.stroke();
            } else { // dots (default)
                var mask = document.createElement('canvas');
                mask.width = w; mask.height = h;
                var mc = mask.getContext('2d');
                landPath(mc, w, h);
                mc.fillStyle = '#fff';
                mc.fill('evenodd');
                var px = mc.getImageData(0, 0, w, h).data;
                var step = Math.max(4, Math.round(h / 60));
                c.fillStyle = cfg.mapColor;
                var rDot = Math.max(1, step * 0.22);
                for (var y = Math.floor(step / 2); y < h; y += step) {
                    for (var x = Math.floor(step / 2); x < w; x += step) {
                        if (px[(y * w + x) * 4 + 3] > 128) {
                            c.beginPath();
                            c.arc(x, y, rDot, 0, 6.2832);
                            c.fill();
                        }
                    }
                }
            }
        }

        var sunState = { lat: 0, lon: 0, fromApi: false };
        var nightCanvas = null, nightKey = '';

        function rebuildNightLayer() {
            if (!canvas || canvas.width === 0) return;
            var w = canvas.width, h = canvas.height;
            // redraw only when the subsolar point moved >= 0.25 deg or canvas resized
            var key = w + 'x' + h + ':' + sunState.lat.toFixed(1) + ',' + (Math.round(sunState.lon * 4) / 4).toFixed(2);
            if (key === nightKey && nightCanvas) return;
            nightKey = key;
            nightCanvas = document.createElement('canvas');
            nightCanvas.width = w; nightCanvas.height = h;
            var c = nightCanvas.getContext('2d');
            c.beginPath();
            // terminator latitude per column: tan(phi) = -cos(H) / tan(decl)
            for (var x = 0; x <= w; x += 2) {
                var lon = x / w * 360 - 180;
                var phi = terminatorLat(lon, sunState);
                var y = projY(phi, h);
                if (x === 0) c.moveTo(0, y); else c.lineTo(x, y);
            }
            // night is on the pole opposite the sun's declination
            if (sunState.lat >= 0) { c.lineTo(w, h); c.lineTo(0, h); }  // fill to south
            else { c.lineTo(w, 0); c.lineTo(0, 0); }                     // fill to north
            c.closePath();
            c.save();
            c.filter = 'blur(' + Math.max(2, h * 0.015) + 'px)';
            c.fillStyle = 'rgba(0, 0, 0, 0.45)';
            c.fill();
            c.restore();
        }

        function updateSun() {
            if (!sunState.fromApi) {
                var s = subsolarPoint(Date.now());
                sunState.lat = s.lat; sunState.lon = s.lon;
            }
            rebuildNightLayer();
        }

        var API_BASE = 'https://api.wheretheiss.at/v1/satellites/25544';
        var issState = { fix: null, prevFix: null, lastFixAt: 0, failures: 0, acquiring: true, mocked: false, offline: false, inFlight: false };
        var pollTimer = null;

        function __issMock(fix) {
            issState.mocked = true;
            clearTimeout(pollTimer);
            issState.fix = null;
            issState.prevFix = null;
            applyFix(fix);
        }
        function __issMockOffline(on) {
            issState.offline = on;
            if (on) { issState.lastFixAt = Date.now() - 120000; updateSidebar(); drawFrame(); }
        }

        function fetchJSON(url) {
            if (issState.offline) return Promise.reject(new Error('mock offline'));
            return fetch(url, { signal: AbortSignal.timeout(12000) }).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });
        }

        function applyFix(data) {
            issState.prevFix = issState.fix;
            issState.fix = data;
            issState.lastFixAt = Date.now();
            issState.failures = 0;
            issState.acquiring = false;
            if (typeof data.solar_lat === 'number') {
                sunState.lat = data.solar_lat;
                sunState.lon = wrapLon(data.solar_lon);
                sunState.fromApi = true;
                rebuildNightLayer();
            }
            updateSidebar();
            drawFrame();
        }

        function pollPosition() {
            if (issState.mocked || issState.inFlight) return;  // single-flight: fetches may outlive the 5 s cadence
            issState.inFlight = true;
            fetchJSON(API_BASE).then(function(data) {
                issState.inFlight = false;
                if (!issState.mocked) applyFix(data);  // a mock installed mid-flight wins
            }).catch(function() {
                issState.inFlight = false;
                issState.failures++;
                updateSidebar();
                var backoff = [5000, 15000, 30000, 60000][Math.min(issState.failures - 1, 3)];
                clearTimeout(pollTimer);
                pollTimer = setTimeout(pollLoop, backoff);
            });
        }
        function pollLoop() {
            pollPosition();
            clearTimeout(pollTimer);
            pollTimer = setTimeout(pollLoop, 5000);
        }

        var trackState = { points: [], fetchedAt: 0 };

        function fetchTrack() {
            if (issState.mocked && trackState.points.length) return;
            var now = Math.floor(Date.now() / 1000);
            var stamps = [];
            for (var i = 0; i < 30; i++) stamps.push(now - 2700 + Math.round(i * (2700 + 5520) / 29));
            var chunks = [stamps.slice(0, 10), stamps.slice(10, 20), stamps.slice(20, 30)];
            Promise.all(chunks.map(function(c) {
                return fetchJSON(API_BASE + '/positions?timestamps=' + c.join(',') + '&units=kilometers');
            })).then(function(results) {
                var pts = [];
                results.forEach(function(list) {
                    list.forEach(function(p) { pts.push([p.timestamp, p.longitude, p.latitude]); });
                });
                pts.sort(function(a, b) { return a[0] - b[0]; });
                trackState.points = pts;
                trackState.fetchedAt = Date.now();
                drawFrame();
            }).catch(function() { /* keep previous track; next cycle retries */ });
        }
        function __issMockTrack(points) { trackState.points = points; trackState.fetchedAt = Date.now(); drawFrame(); }

        var userLoc = { lat: null, lon: null, resolved: '' };
        var passState = { riseTs: null, noPass: false, overhead: false, scanning: false };
        var SCAN_STEP_S = 120, SCAN_HORIZON_S = 21600; // 2 min steps, 6 h

        function resolveLocation() {
            var locId = String(cfg.issLocation || '').trim();
            if (!locId || locId === userLoc.resolved) return;
            fetch('https://geocoding-api.open-meteo.com/v1/get?id=' + encodeURIComponent(locId),
                  { signal: AbortSignal.timeout(8000) })
                .then(function(r) { return r.json(); })
                .then(function(loc) {
                    if (typeof loc.latitude !== 'number') return;
                    userLoc.lat = loc.latitude; userLoc.lon = loc.longitude;
                    userLoc.resolved = locId;
                    passState.riseTs = null; passState.noPass = false;
                    scanForPass();
                    drawFrame();
                })
                .catch(function() { /* retried on next onDataUpdated */ });
        }

        function footprintRadiusKm() {
            return ((issState.fix && issState.fix.footprint) || 4500) / 2;
        }

        function scanForPass() {
            if (userLoc.lat === null || passState.scanning || issState.mocked) return;
            passState.scanning = true;
            var now = Math.floor(Date.now() / 1000);
            var stamps = [];
            for (var t = now; t <= now + SCAN_HORIZON_S; t += SCAN_STEP_S) stamps.push(t);
            var chunks = [];
            for (var i = 0; i < stamps.length; i += 10) chunks.push(stamps.slice(i, i + 10));
            var samples = [];
            function next(idx) {
                if (idx >= chunks.length) return finish();
                fetchJSON(API_BASE + '/positions?timestamps=' + chunks[idx].join(',') + '&units=kilometers')
                    .then(function(list) {
                        list.forEach(function(p) { samples.push([p.timestamp, p.longitude, p.latitude]); });
                        // stop early once a pass is already found in fetched samples
                        var hit = findPassInSamples(samples, userLoc.lat, userLoc.lon, footprintRadiusKm());
                        if (hit) return finish();
                        setTimeout(function() { next(idx + 1); }, 200);
                    })
                    .catch(function() { passState.scanning = false; setTimeout(scanForPass, 60000); });
            }
            function finish() {
                samples.sort(function(a, b) { return a[0] - b[0]; });
                var hit = findPassInSamples(samples, userLoc.lat, userLoc.lon, footprintRadiusKm());
                if (!hit) { passState.riseTs = null; passState.noPass = true; passState.scanning = false; updateSidebar(); return; }
                if (!hit.brackets) { passState.riseTs = hit.riseTs; passState.noPass = false; passState.scanning = false; updateSidebar(); return; }
                // refine: 10 stamps across the 2-min bracket -> rise within ~13 s
                var lo = hit.brackets[0], hi = hit.brackets[1];
                var fine = [];
                for (var k = 0; k < 10; k++) fine.push(Math.round(lo + (hi - lo) * k / 9));
                fetchJSON(API_BASE + '/positions?timestamps=' + fine.join(',') + '&units=kilometers')
                    .then(function(list) {
                        var fs = list.map(function(p) { return [p.timestamp, p.longitude, p.latitude]; })
                                     .sort(function(a, b) { return a[0] - b[0]; });
                        var fhit = findPassInSamples(fs, userLoc.lat, userLoc.lon, footprintRadiusKm());
                        passState.riseTs = fhit ? fhit.riseTs : hit.riseTs;
                        passState.noPass = false; passState.scanning = false;
                        updateSidebar();
                    })
                    .catch(function() { passState.riseTs = hit.riseTs; passState.noPass = false; passState.scanning = false; updateSidebar(); });
            }
            next(0);
        }

        function __issMockUser(lat, lon) { userLoc.lat = lat; userLoc.lon = lon; userLoc.resolved = 'mock'; drawFrame(); }
        function __issMockPass(riseTs) { passState.riseTs = riseTs; passState.noPass = riseTs === null; updateSidebar(); }

        function fmtCountdown(s) {
            if (s < 0) s = 0;
            var h2 = Math.floor(s / 3600), m2 = Math.floor((s % 3600) / 60), s2 = Math.floor(s % 60);
            return (h2 < 10 ? '0' : '') + h2 + ':' + (m2 < 10 ? '0' : '') + m2 + ':' + (s2 < 10 ? '0' : '') + s2;
        }

        function updatePassDisplay() {
            var el = document.getElementById('val-pass');
            if (getComputedStyle(el).display === 'none') return;
            var ll = currentIssLonLat();
            passState.overhead = !!(ll && userLoc.lat !== null &&
                haversineKm(userLoc.lat, userLoc.lon, ll[1], ll[0]) < footprintRadiusKm());
            if (passState.overhead) { el.textContent = TRS['Overhead now']; return; }
            if (passState.riseTs) {
                var remain = passState.riseTs - Date.now() / 1000;
                if (remain <= 0) { passState.riseTs = null; scanForPass(); el.textContent = '—'; return; }
                el.textContent = fmtCountdown(remain);
                return;
            }
            el.textContent = passState.noPass ? TRS['No pass in next 6 h'] : '—';
        }

        var lastAnim = 0;
        function animLoop(t) {
            var fpsCap = (typeof iCUE !== 'undefined' && iCUE.fpsLimit) ? iCUE.fpsLimit : 30;
            var minInterval = 1000 / Math.min(fpsCap, 15); // marker pulse needs <= 15 fps
            if (t - lastAnim >= minInterval) { lastAnim = t; drawFrame(); }
            requestAnimationFrame(animLoop);
        }

        // Dead-reckon between fixes; freeze extrapolation past 60 s staleness.
        function currentIssLonLat() {
            var f = issState.fix;
            if (!f) return null;
            var p = issState.prevFix;
            var ageS = Math.min((Date.now() - issState.lastFixAt) / 1000, 60);
            if (!p || p.timestamp === f.timestamp) return [f.longitude, f.latitude];
            var dt = f.timestamp - p.timestamp;
            var vLon = (wrapLon(f.longitude - p.longitude)) / dt;
            var vLat = (f.latitude - p.latitude) / dt;
            return [wrapLon(f.longitude + vLon * ageS), f.latitude + vLat * ageS];
        }

        function isStale() { return !issState.acquiring && Date.now() - issState.lastFixAt > 60000; }

        function fmt1(n) { return (Math.round(n * 10) / 10).toLocaleString('en-US'); }
        function fmtCoord(lat, lon) {
            return Math.abs(lat).toFixed(1) + '°' + (lat >= 0 ? 'N' : 'S') + ' ' +
                   Math.abs(lon).toFixed(1) + '°' + (lon >= 0 ? 'E' : 'W');
        }

        var TRS = { Live: 'Live', Stale: 'Stale', Acquiring: 'Acquiring', Daylight: 'Daylight',
                    Eclipse: 'Eclipse', 'Overhead now': 'Overhead now',
                    'No pass in next 6 h': 'No pass in next 6 h' };
        function cacheTranslations() {
            if (typeof tr !== 'function') return;
            Object.keys(TRS).forEach(function(k) { tr(k).then(function(s) { TRS[k] = s; }); });
        }

        function updateSidebar() {
            var f = issState.fix;
            var live = document.getElementById('val-live');
            if (issState.acquiring) {
                live.textContent = TRS.Acquiring + '…';
                return;
            }
            live.textContent = isStale() ? '○ ' + TRS.Stale : '● ' + TRS.Live;
            document.getElementById('val-vis').textContent =
                f.visibility === 'eclipse' ? TRS.Eclipse : TRS.Daylight;
            var alt = document.getElementById('val-alt');
            if (getComputedStyle(alt).display !== 'none') alt.textContent = fmt1(f.altitude) + ' km';
            var spd = document.getElementById('val-spd');
            if (getComputedStyle(spd).display !== 'none') spd.textContent = Math.round(f.velocity).toLocaleString('en-US') + ' km/h';
            var pos = document.getElementById('val-pos');
            if (getComputedStyle(pos).display !== 'none') {
                var ll = currentIssLonLat();
                pos.textContent = fmtCoord(ll[1], ll[0]);
            }
        }

        function drawFrame() {
            if (!ctx) return;
            var w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            if (landCanvas) ctx.drawImage(landCanvas, 0, 0);
            if (nightCanvas) ctx.drawImage(nightCanvas, 0, 0);
            if (userLoc.lat !== null) {
                var ux = projX(userLoc.lon, w), uy = projY(userLoc.lat, h);
                var ur = Math.max(3, h * 0.011);
                ctx.strokeStyle = cfg.mapColor;
                ctx.lineWidth = Math.max(1.5, ur * 0.45);
                ctx.beginPath(); ctx.arc(ux, uy, ur, 0, 6.2832); ctx.stroke();
                ctx.fillStyle = cfg.mapColor;
                ctx.beginPath(); ctx.arc(ux, uy, ur * 0.4, 0, 6.2832); ctx.fill();
            }
            if (trackState.points.length > 1) {
                var nowS = Date.now() / 1000;
                var past = [], future = [];
                for (var i = 0; i < trackState.points.length - 1; i++) {
                    var p1 = trackState.points[i], p2 = trackState.points[i + 1];
                    for (var k = 0; k < 6; k++) {
                        var sp = slerpPoint(p1[1], p1[2], p2[1], p2[2], k / 6);
                        var ts = p1[0] + (p2[0] - p1[0]) * k / 6;
                        (ts <= nowS ? past : future).push(sp);
                    }
                }
                var lw = Math.max(1.5, h / 350);
                ctx.strokeStyle = cfg.accentColor;
                ctx.lineWidth = lw;
                ctx.globalAlpha = 0.8;
                splitAtAntimeridian(past).forEach(function(seg) {
                    if (seg.length < 2) return;
                    ctx.beginPath();
                    ctx.moveTo(projX(seg[0][0], w), projY(seg[0][1], h));
                    for (var j = 1; j < seg.length; j++) ctx.lineTo(projX(seg[j][0], w), projY(seg[j][1], h));
                    ctx.stroke();
                });
                ctx.globalAlpha = 0.55;
                ctx.setLineDash([lw * 3, lw * 3.5]);
                splitAtAntimeridian(future).forEach(function(seg) {
                    if (seg.length < 2) return;
                    ctx.beginPath();
                    ctx.moveTo(projX(seg[0][0], w), projY(seg[0][1], h));
                    for (var j = 1; j < seg.length; j++) ctx.lineTo(projX(seg[j][0], w), projY(seg[j][1], h));
                    ctx.stroke();
                });
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
            }
            var ll = currentIssLonLat();
            if (ll) {
                var x = projX(ll[0], w), y = projY(ll[1], h);
                var rBase = Math.max(4, h * 0.016);
                var pulse = isStale() ? 0 : (Math.sin(Date.now() / 1000 * Math.PI) + 1) / 2; // 0.5 Hz
                ctx.fillStyle = cfg.accentColor;
                ctx.globalAlpha = 0.12 + 0.10 * pulse;
                ctx.beginPath(); ctx.arc(x, y, rBase * (2.4 + pulse), 0, 6.2832); ctx.fill();
                ctx.globalAlpha = 0.28;
                ctx.beginPath(); ctx.arc(x, y, rBase * 1.6, 0, 6.2832); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.beginPath(); ctx.arc(x, y, rBase, 0, 6.2832); ctx.fill();
            }
        }

        function resizeCanvas() {
            var wrap = document.getElementById('map-wrap');
            if (wrap.clientWidth === 0) return;
            canvas.width = Math.round(wrap.clientWidth * dpr);
            canvas.height = Math.round(wrap.clientHeight * dpr);
            nightKey = '';
            rebuildLandLayer();
            drawFrame();
        }

        function readSettings() {
            if (typeof issLocation !== 'undefined') cfg.issLocation = issLocation;
            if (typeof mapStyle !== 'undefined') cfg.mapStyle = mapStyle;
            if (typeof textColor !== 'undefined') cfg.textColor = textColor;
            if (typeof accentColor !== 'undefined') cfg.accentColor = accentColor;
            if (typeof mapColor !== 'undefined') cfg.mapColor = mapColor;
            if (typeof backgroundColor !== 'undefined') cfg.bgColor = backgroundColor;
            if (typeof transparency !== 'undefined') cfg.transparency = Number(transparency) || 0;
            if (typeof customTitle !== 'undefined') {
                var wt = document.getElementById('widget-title');
                wt.textContent = customTitle;
                wt.style.display = customTitle ? 'block' : 'none';
            }
            var blur = (typeof glassBlur !== 'undefined') ? glassBlur : 0;
            document.documentElement.style.setProperty('--glass-blur', blur + 'px');
            if (mediaViewer) {
                var media = (typeof backgroundMedia !== 'undefined') ? backgroundMedia : null;
                if (media) { mediaViewer.loadMedia(media); } else { mediaViewer.clear(); }
            }
        }

        function applySettings() {
            var root = document.documentElement;
            root.style.setProperty('--text-color', cfg.textColor);
            root.style.setProperty('--accent-color', cfg.accentColor);
            root.style.setProperty('--map-color', cfg.mapColor);
            root.style.setProperty('--bg-color', cfg.bgColor);
            root.style.setProperty('--widget-opacity', cfg.transparency / 100);
        }

        function translateLabels() {
            var els = document.querySelectorAll('[data-tr]');
            els.forEach(function(el) {
                var key = el.getAttribute('data-tr');
                if (typeof tr === 'function') {
                    tr(key).then(function(s) { el.textContent = s; });
                } else {
                    el.textContent = key;
                }
            });
        }

        function onInit() {
            mediaViewer = new MediaViewer({ container: document.getElementById('media-background') });
            canvas = document.getElementById('map');
            ctx = canvas.getContext('2d');
            new ResizeObserver(resizeCanvas).observe(document.getElementById('map-wrap'));
            resizeCanvas();
            readSettings();
            applySettings();
            translateLabels();
            updateSun();
            setInterval(function() { updateSun(); drawFrame(); }, 60000);
            drawFrame();
            cacheTranslations();
            updateSidebar();
            pollLoop();
            fetchTrack();
            setInterval(fetchTrack, 300000);
            requestAnimationFrame(animLoop);
            resolveLocation();
            setInterval(scanForPass, 1800000);
            setInterval(updatePassDisplay, 1000);
        }

        icueEvents = {
            "onICUEInitialized": onInit,
            "onDataUpdated": function() {
                var prevStyle = cfg.mapStyle, prevMap = cfg.mapColor;
                readSettings();
                applySettings();
                resolveLocation();
                if (cfg.mapStyle !== prevStyle || cfg.mapColor !== prevMap) rebuildLandLayer();
                drawFrame();
            }
        };
        if (typeof iCUE_initialized !== 'undefined' && iCUE_initialized) { onInit(); }
        if (typeof iCUE_initialized === 'undefined') { onInit(); }
    </script>
</body>
</html>
